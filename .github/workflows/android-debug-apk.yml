name: Android Debug APK

on:
  pull_request:
  workflow_dispatch:

jobs:
  build-android:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Set up Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install JS dependencies
        run: npm ci

      - name: Build web app
        run: npm run build
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_PUBLISHABLE_KEY: ${{ secrets.VITE_SUPABASE_PUBLISHABLE_KEY }}

      - name: TypeScript check
        run: npx tsc --noEmit

      - name: Validate content
        run: npm run validate:content

      - name: Unit tests
        run: npm run test:unit

      - name: Sync Capacitor Android
        run: npx cap sync android

      - name: Install Android SDK platform 36 and build-tools
        run: |
          echo "y" | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager \
            "platforms;android-36" \
            "build-tools;36.0.0" \
            --sdk_root=$ANDROID_HOME

      - name: Make gradlew executable
        run: chmod +x android/gradlew

      - name: Build debug APK
        working-directory: android
        run: ./gradlew assembleDebug --no-daemon
        env:
          ANDROID_HOME: ${{ env.ANDROID_HOME }}

      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: the-other-99-debug-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30

      - name: Publish APK as GitHub pre-release (owner tester distribution)
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          BRANCH: ${{ github.head_ref || github.ref_name }}
        run: |
          # Rename APK to a human-readable filename
          cp android/app/build/outputs/apk/debug/app-debug.apk \
             android/app/build/outputs/apk/debug/the-other-99-debug.apk
          # Delete existing pre-release tag so we can recreate it
          gh release delete "debug-apk-latest" --yes 2>/dev/null || true
          git push origin :refs/tags/debug-apk-latest 2>/dev/null || true
          # Create pre-release with the raw APK attached
          gh release create "debug-apk-latest" \
            --title "Debug APK — latest ($(date -u '+%Y-%m-%d %H:%M UTC'))" \
            --notes "**Branch:** \`${BRANCH}\`

  Debug build for internal testing. Not for production.

  **How to install:**
  1. Download \`the-other-99-debug.apk\` below.
  2. On your Android phone: Settings → Security → allow \*Install unknown apps\* for your file manager or browser.
  3. Open the downloaded APK and tap Install.

  **To share with a tester via Google Drive:**
  1. Upload \`the-other-99-debug.apk\` to Google Drive.
  2. Share the Drive link (viewer access).
  3. Tester opens the link on their Android device → downloads → installs.
  Do NOT send the APK file directly through Messenger — it may be blocked." \
            --prerelease \
            android/app/build/outputs/apk/debug/the-other-99-debug.apk
